[profile.default]
src = 'contracts'
out = 'out'
libs = ['lib']
fs_permissions = [{ access = "read-write", path = "./"}]
via_ir = true
optimizer = true
optimizer_runs = 200
solc = "0.8.33"
evm_version = "osaka"

[lint]
exclude_lints = ["unsafe-cheatcode", "unwrapped-modifier-logic", "unsafe-typecast"]

# `forge doc` — renders NatSpec on contracts in `contracts/` into markdown.
#
# Scope via --include/--exclude on the CLI rather than globs here, since there's no
# native toml field; the yarn script in package.json passes the right flags.
[doc]
out = "docs"
title = "Greek.fi Protocol — Contract Reference"
ignore = ["contracts/libraries", "contracts/mocks", "contracts/future"]
repository = "https://github.com/greekfi/protocol"


[rpc_endpoints]
# Deploy-facing RPCs use public endpoints (no API-key IP whitelist).
# Fork tests read BASE_RPC_URL from .env (Alchemy) with a public fallback.
default_network = "http://127.0.0.1:8545"

unichain = "https://unichain.drpc.org"
mainnet = "https://ethereum-rpc.publicnode.com"
arbitrum = "https://arb1.arbitrum.io/rpc"
base = "https://mainnet.base.org"
ink = "https://rpc-gel.inkonchain.com"
sepolia = "https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
arbitrumSepolia = "https://arb-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
optimism = "https://opt-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
optimismSepolia = "https://opt-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
polygon = "https://polygon-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
polygonMumbai = "https://polygon-mumbai.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
polygonZkEvm = "https://zkevm-rpc.com"
polygonZkEvmTestnet = "https://rpc.public.zkevm-test.net"
gnosis = "https://rpc.gnosischain.com"
chiado = "https://rpc.chiadochain.net"
baseSepolia = "https://sepolia.base.org"
scrollSepolia = "https://sepolia-rpc.scroll.io"
scroll = "https://rpc.scroll.io"
pgn = "https://rpc.publicgoods.network"
pgnTestnet = "https://sepolia.publicgoods.network"


localhost = "http://127.0.0.1:8545"

[etherscan]
polygonMumbai = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }



[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
bracket_spacing = true
int_types = "long"




# See more config options https://book.getfoundry.sh/reference/config/overview