name: Lint

# Foundry-only job. Runs the forge fmt / build / test pass — the things that
# only depend on `foundry/`. MM-only or frontend-only PRs don't pay for it.
# Other surfaces have their own workflows (deploy-mm.yml, docs.yml; Vercel
# handles core/ on its own).
on:
  push:
    branches:
      - main
    paths:
      - "foundry/**"
      - ".github/workflows/lint.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "foundry/**"
      - ".github/workflows/lint.yaml"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Init foundry submodules
        run: |
          git -c url."https://github.com/".insteadOf="git@github.com:" \
            submodule update --init --recursive foundry/lib

      - name: Install foundry-toolchain
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
          # Caching "nightly" by its string name pins the first nightly CI ever
          # saw, so forge fmt / build start drifting from what local devs run.
          # Fetch fresh on every run.
          cache: false

      - name: Check formatting
        working-directory: foundry
        env:
          FOUNDRY_DISABLE_NIGHTLY_WARNING: 1
        run: forge fmt --check

      - name: Build
        working-directory: foundry
        env:
          FOUNDRY_DISABLE_NIGHTLY_WARNING: 1
        run: forge build

      - name: Test
        working-directory: foundry
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          FOUNDRY_DISABLE_NIGHTLY_WARNING: 1
        run: forge test
