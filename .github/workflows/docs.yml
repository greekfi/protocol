name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "foundry/contracts/**"
      - "foundry/foundry.toml"
      - "foundry/remappings.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Init foundry submodules
        run: |
          git -c url."https://github.com/".insteadOf="git@github.com:" \
            submodule update --init --recursive foundry/lib

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
          # Same rationale as lint.yaml: keying the cache on "nightly"
          # pins the first nightly seen and silently drifts from local.
          cache: false

      - name: Generate forge-doc markdown
        working-directory: foundry
        env:
          FOUNDRY_DISABLE_NIGHTLY_WARNING: 1
        run: forge doc --out docs

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs deps
        working-directory: docs
        run: npm ci

      - name: Post-process forge-doc into Docusaurus pages
        working-directory: docs
        run: node scripts/gen-reference.mjs

      - name: Build docs
        working-directory: docs
        run: npm run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
