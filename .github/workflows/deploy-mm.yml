name: Deploy market-maker

on:
  push:
    branches: [main]
    paths:
      - "market-maker/**"
      - "Dockerfile"
      - ".dockerignore"
      - "core/abi/**"
      - ".github/workflows/deploy-mm.yml"
  workflow_dispatch:

# One deploy at a time. New runs queue, they don't cancel — Fly's rolling
# strategy makes mid-flight cancels messy.
concurrency:
  group: deploy-mm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: fly deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config market-maker/fly.toml --remote-only --wait-timeout 300
