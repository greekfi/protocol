[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
fs_permissions = [{ access = "read-write", path = "./" }]
via_ir = true
optimizer = true
optimizer_runs = 200
solc = "0.8.33"
evm_version = "cancun"

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"
unichain = "https://unichain.drpc.org"
localhost = "http://127.0.0.1:8545"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
bracket_spacing = true
int_types = "long"
